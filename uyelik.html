<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üyelik Başvurusu - Doğu Anadolu Şehit Gazi Derneği</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#111827] text-white antialiased">

    <nav class="bg-[#111827] text-white border-b-4 border-[#E30A17] sticky top-0 z-50 shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 h-full flex justify-between items-center relative">
            <a href="index.html" class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-10 w-auto object-contain">
                <h1 class="text-sm md:text-lg font-bold uppercase tracking-tight">DOĞU ANADOLU</h1>
            </a>
            <div class="hidden md:flex space-x-6 items-center font-bold text-xs uppercase">
                <a href="index.html" class="hover:text-[#E30A17] transition">Anasayfa</a>
                <a href="hakkimizda.html" class="hover:text-[#E30A17] transition">Hakkımızda</a>
                <a href="sehitlerimiz.html" class="hover:text-[#E30A17] transition">Şehitlerimiz</a>
                <a href="uyelik.html" class="text-[#E30A17]">Üyelik</a>
            </div>
            <div class="flex md:hidden items-center">
                <button id="mobile-menu-btn" class="bg-[#E30A17] text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="py-12 text-center bg-gray-900/50">
        <h2 class="text-3xl font-black uppercase tracking-widest italic">Üyelik Başvuru Formu</h2>
        <div class="w-24 h-1 bg-[#E30A17] mx-auto mt-4"></div>
    </section>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <div class="bg-gray-800/50 p-8 rounded-2xl border border-gray-700 shadow-2xl">
            <form id="membershipForm" action="https://formspree.io/f/xbdzoazb" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <p class="text-gray-400 text-sm italic border-b border-gray-700 pb-2">* Yıldızlı alanların doldurulması zorunludur.</p>

                <div>
                    <label class="block text-xs font-bold uppercase mb-2">Ad Soyad *</label>
                    <input type="text" name="ad_soyad" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded focus:border-[#E30A17] outline-none transition">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2">E-Mail Adresi *</label>
                        <input type="email" name="email" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded focus:border-[#E30A17] outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2">Telefon Numarası *</label>
                        <input type="tel" name="telefon" placeholder="05xx xxx xx xx" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded focus:border-[#E30A17] outline-none">
                    </div>
                </div>

                <div class="space-y-6 bg-gray-900/50 p-6 rounded-xl border border-dashed border-gray-600">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2"><i class="fa-solid fa-camera mr-2 text-[#E30A17]"></i> Vesikalık Fotoğraf (Geçerli Bir Fotoğraf) *</label>
                        <input type="file" name="fotograf" accept="image/*" required class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#E30A17] file:text-white hover:file:bg-red-700">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase mb-2"><i class="fa-solid fa-file-shield mr-2 text-[#E30A17]"></i> E-Devlet Adli Sicil Kaydı (PDF/JPG) *</label>
                        <input type="file" name="adli_sicil" accept=".pdf,image/*" required class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#E30A17] file:text-white hover:file:bg-red-700">
                    </div>

                    <div class="pt-4 border-t border-gray-700">
                        <label class="block text-xs font-bold uppercase mb-2 text-yellow-500 italic">Güvenlik Korucusu İseniz (Opsiyonel):</label>
                        <label class="block text-[10px] text-gray-500 mb-2">Görev Belgesi / Çalıştığına Dair Evrak</label>
                        <input type="file" name="korucu_evrak" accept=".pdf,image/*" class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-700 file:text-white">
                    </div>
                </div>

                <button type="submit" id="submitBtn" disabled class="w-full py-4 bg-gray-600 text-white font-black uppercase tracking-widest rounded-lg shadow-xl cursor-not-allowed transition-all">
                    Başvuruyu Tamamla / Kaydet
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-[#111827] border-t-4 border-[#E30A17] py-12 text-center">
        <p class="text-gray-500 text-[10px] tracking-[0.5em] uppercase">© 2026 Doğu Anadolu Şehit Gazi Derneği | Erzurum</p>
    </footer>

    <script>
        const form = document.getElementById('membershipForm');
        const btn = document.getElementById('submitBtn');
        const inputs = form.querySelectorAll('input[required]');

        // Form Doluluk Kontrolü (Buton Aktif Etme)
        form.addEventListener('input', () => {
            let allFilled = true;
            inputs.forEach(input => {
                if (input.type === 'file') {
                    if (input.files.length === 0) allFilled = false;
                } else {
                    if (input.value.trim() === '') allFilled = false;
                }
            });

            if (allFilled) {
                btn.disabled = false;
                btn.classList.remove('bg-gray-600', 'cursor-not-allowed');
                btn.classList.add('bg-[#E30A17]', 'hover:bg-red-700');
            } else {
                btn.disabled = true;
                btn.classList.add('bg-gray-600', 'cursor-not-allowed');
                btn.classList.remove('bg-[#E30A17]', 'hover:bg-red-700');
            }
        });

        // Gönderme Sonrası Mesaj
        form.onsubmit = function() {
            const siraNo = Math.floor(1000 + Math.random() * 9000); // Rastgele sıra no üretir
            alert(siraNo + " sıra numarası ile başvurunuz alınmıştır. Belgeleriniz doguanadolusehitgazi@gmail.com adresine iletiliyor. Size en kısa sürede dönüş yapılacaktır.");
            return true; 
        };
    </script>
</body>
</html>
