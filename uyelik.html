<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üyelik Başvurusu - Doğu Anadolu Şehit Gazi Derneği</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#111827] text-white antialiased">

    <nav class="bg-[#111827] text-white border-b-4 border-[#E30A17] sticky top-0 z-50 shadow-lg h-20">
        <div class="max-w-7xl mx-auto px-4 h-full flex justify-between items-center relative">
            <a href="index.html" class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="h-10 w-auto object-contain">
                <h1 class="text-sm md:text-lg font-bold uppercase tracking-tight text-white">DOĞU ANADOLU</h1>
            </a>
            <div class="hidden md:flex space-x-6 items-center font-bold text-xs uppercase">
                <a href="index.html" class="hover:text-[#E30A17] transition text-white">Anasayfa</a>
                <a href="hakkimizda.html" class="hover:text-[#E30A17] transition text-white">Hakkımızda</a>
                <a href="sehitlerimiz.html" class="hover:text-[#E30A17] transition text-white">Şehitlerimiz</a>
                <a href="uyelik.html" class="text-[#E30A17]">Üyelik</a>
            </div>
            <div class="flex md:hidden items-center">
                <button id="mobile-menu-btn" class="bg-[#E30A17] text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="py-12 text-center bg-gray-900/50">
        <h2 class="text-3xl font-black uppercase tracking-widest italic">Üyelik Başvuru Formu</h2>
        <div class="w-24 h-1 bg-[#E30A17] mx-auto mt-4"></div>
    </section>

    <main class="container mx-auto px-4 py-12 max-w-3xl">
        <div class="bg-gray-800/50 p-8 rounded-2xl border border-gray-700 shadow-2xl">
            <form id="membershipForm" action="https://formspree.io/f/xbdzoazb" method="POST" enctype="multipart/form-data" class="space-y-6">
                
                <p class="text-gray-400 text-sm italic border-b border-gray-700 pb-2">* Yıldızlı alanların doldurulması zorunludur.</p>

                <input type="hidden" id="googleScriptUrl" value="https://script.google.com/macros/s/AKfycbxwT823PuzeM_akURamMoa3KHhf_DEGrS58sqm0hzgidO18qcUQ6vXCqmRdcdYaDO8uTw/exec">

                <div>
                    <label class="block text-xs font-bold uppercase mb-2 text-white">Ad Soyad *</label>
                    <input type="text" name="Ad_Soyad" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded focus:border-[#E30A17] outline-none transition text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2 text-white">E-Mail Adresi *</label>
                        <input type="email" name="Email_Adresi" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded focus:border-[#E30A17] outline-none text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2 text-white">Telefon Numarası *</label>
                        <input type="tel" name="Telefon_No" placeholder="05xx xxx xx xx" required class="w-full bg-gray-900 border border-gray-700 p-3 rounded focus:border-[#E30A17] outline-none text-white">
                    </div>
                </div>

                <div class="space-y-6 bg-gray-900/50 p-6 rounded-xl border border-dashed border-gray-600">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-2 text-white"><i class="fa-solid fa-camera mr-2 text-[#E30A17]"></i> Vesikalık Fotoğraf *</label>
                        <input type="file" name="fotograf" accept="image/*" required class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#E30A17] file:text-white hover:file:bg-red-700 cursor-pointer">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase mb-2 text-white"><i class="fa-solid fa-file-shield mr-2 text-[#E30A17]"></i> E-Devlet Adli Sicil Kaydı (PDF/JPG) *</label>
                        <input type="file" name="adli_sicil" accept=".pdf,image/*" required class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#E30A17] file:text-white hover:file:bg-red-700 cursor-pointer">
                    </div>

                    <div class="pt-4 border-t border-gray-700">
                        <label class="block text-xs font-bold uppercase mb-2 text-yellow-500 italic">Güvenlik Korucusu İseniz (Opsiyonel):</label>
                        <input type="file" name="korucu_evrak" accept=".pdf,image/*" class="text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-gray-700 file:text-white cursor-pointer">
                    </div>
                </div>

                <button type="submit" id="submitBtn" disabled class="w-full py-4 bg-gray-600 text-white font-black uppercase tracking-widest rounded-lg shadow-xl cursor-not-allowed transition-all">
                    Başvuruyu Tamamla / Kaydet
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-[#111827] border-t-4 border-[#E30A17] py-12 text-center">
        <p class="text-gray-500 text-[10px] tracking-[0.5em] uppercase">© 2026 Doğu Anadolu Şehit Gazi Derneği | Erzurum</p>
    </footer>

    <script>
        const form = document.getElementById('membershipForm');
        const submitBtn = document.getElementById('submitBtn');
        const googleUrl = document.getElementById('googleScriptUrl').value;

        // Buton Aktif Etme Kontrolü
        form.addEventListener('input', () => {
            const requiredFields = form.querySelectorAll('[required]');
            let isFormValid = true;

            requiredFields.forEach(field => {
                if (field.type === 'file') {
                    if (field.files.length === 0) isFormValid = false;
                } else {
                    if (field.value.trim() === "") isFormValid = false;
                }
            });

            if (isFormValid) {
                submitBtn.disabled = false;
                submitBtn.classList.replace('bg-gray-600', 'bg-[#E30A17]');
                submitBtn.classList.remove('cursor-not-allowed');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.replace('bg-[#E30A17]', 'bg-gray-600');
                submitBtn.classList.add('cursor-not-allowed');
            }
        });

        // Form Gönderme İşlemi
        form.onsubmit = function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "KAYDEDİLİYOR...";

            // 1. ADIM: Google Sheets'e Veri Gönder (Sadece Metinler)
            const googleData = new FormData();
            googleData.append('Ad_Soyad', form.Ad_Soyad.value);
            googleData.append('Email_Adresi', form.Email_Adresi.value);
            googleData.append('Telefon_No', form.Telefon_No.value);

            fetch(googleUrl, {
                method: 'POST',
                body: googleData,
                mode: 'no-cors'
            });

            // 2. ADIM: Formspree'ye Gönder (Tüm Form ve Dosyalar)
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    const siraNo = Math.floor(1000 + Math.random() * 9000);
                    alert("Başvurunuz #" + siraNo + " numarası ile başarıyla alınmıştır. Belgeler mail adresimize iletildi.");
                    form.reset();
                    submitBtn.innerText = "BAŞVURUYU TAMAMLA / KAYDET";
                } else {
                    alert("Bir hata oluştu, lütfen tekrar deneyin.");
                }
            }).catch(() => {
                alert("Bağlantı hatası.");
                submitBtn.disabled = false;
            });
        };
    </script>
</body>
</html>
