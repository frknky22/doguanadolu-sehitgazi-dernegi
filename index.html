<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Doğu Anadolu Şehit Aileleri, Gaziler ve Güvenlik Korucuları Derneği. Erzurum merkezli şehit yakınları ve gaziler dayanışma platformu.">
    <title>Doğu Anadolu Şehit Aileleri, Gaziler ve Güvenlik Korucuları Derneği</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bayrak-kirmizi': '#E30A17',
                        'koyu-siyah': '#111827',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        // ==========================================
        // YÖNETİM ALANI (BURAYI GÜNCELLEYEBİLİRSİN)
        // ==========================================
        const SITE_VERILERI = {
            hakkimizda: "Doğu Anadolu Şehit Aileleri, Gaziler ve Güvenlik Korucuları Derneği olarak; vatanımızın bölünmez bütünlüğü uğruna canlarını feda eden kahramanlarımızın emanetlerine sahip çıkmak, gazilerimizin ve korucularımızın haklarını savunmak için Erzurum merkezli olarak faaliyet gösteriyoruz.",
            misyon: "Şehitlerimizin aziz hatırasını yaşatmak, ailelerimize sahip çıkmak ve gazilerimizin her daim yanında yer alarak toplumsal dayanışmayı güçlendirmek.",
            vizyon: "Doğu Anadolu bölgesinde vatan evlatları ve emanetleri için en kapsamlı ve güvenilir sivil toplum kuruluşu olmak.",
            
            duyurular: [
                {
                    baslik: "Yeni Yönetim Kurulu Duyurusu",
                    tarih: "11 Mart 2026",
                    resim: "https://images.unsplash.com/photo-1594931920512-409ba55cc5f3?w=800",
                    metin: "Derneğimizin yeni dönem projelerini görüşmek üzere yönetim kurulumuz Erzurum merkez binamızda toplandı."
                },
                {
                    baslik: "18 Mart Şehitleri Anma Programı",
                    tarih: "18 Mart 2026",
                    resim: "https://images.unsplash.com/photo-1572537361219-c96765798782?w=800",
                    metin: "Çanakkale Zaferi'nin yıl dönümünde tüm şehitlerimizi Erzurum Şehitliği'nde dualarla anacağız."
                }
            ]
        };
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <header class="bg-koyu-siyah text-white fixed w-full top-0 z-50 border-b-4 border-bayrak-kirmizi shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-star-and-crescent text-3xl text-bayrak-kirmizi"></i>
                <div class="leading-tight">
                    <h1 class="text-sm font-bold uppercase tracking-wider">DOĞU ANADOLU</h1>
                    <p class="text-[10px] text-gray-400 uppercase">Şehit Aileleri, Gaziler ve Korucuları Derneği</p>
                </div>
            </div>
            <nav class="hidden md:flex space-x-6 text-xs font-bold uppercase">
                <a href="#hakkimizda" class="hover:text-bayrak-kirmizi">Hakkımızda</a>
                <a href="#duyurular" class="hover:text-bayrak-kirmizi">Duyurular</a>
                <a href="#iletisim" class="bg-bayrak-kirmizi px-4 py-2 rounded">İletişim</a>
            </nav>
        </div>
    </header>

    <section class="relative h-[60vh] flex items-center justify-center bg-koyu-siyah">
        <div class="absolute inset-0 opacity-40">
            <img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?w=1600" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 text-center px-4">
            <h2 class="text-4xl md:text-6xl font-extrabold text-white mb-4">Vatan Size Minnettar</h2>
            <div class="w-24 h-1 bg-bayrak-kirmizi mx-auto"></div>
        </div>
    </section>

    <section id="hakkimizda" class="py-20 bg-white">
        <div class="container mx-auto px-4 max-w-4xl text-center">
            <h3 class="text-3xl font-bold mb-8 text-koyu-siyah">Biz Kimiz?</h3>
            <p id="hakkimizda-yazi" class="text-lg text-gray-600 leading-relaxed mb-12 italic"></p>
            
            <div class="grid md:grid-cols-2 gap-8 text-left">
                <div class="p-6 bg-gray-50 rounded-xl border-l-4 border-bayrak-kirmizi">
                    <h4 class="font-bold text-bayrak-kirmizi mb-2 uppercase text-sm">Misyonumuz</h4>
                    <p id="misyon-yazi" class="text-gray-700"></p>
                </div>
                <div class="p-6 bg-gray-50 rounded-xl border-l-4 border-bayrak-kirmizi">
                    <h4 class="font-bold text-bayrak-kirmizi mb-2 uppercase text-sm">Vizyonumuz</h4>
                    <p id="vizyon-yazi" class="text-gray-700"></p>
                </div>
            </div>
        </div>
    </section>

    <section id="duyurular" class="py-20 bg-gray-50">
        <div class="container mx-auto px-4">
            <h3 class="text-3xl font-bold text-center mb-16 text-koyu-siyah">Güncel Duyurular</h3>
            <div id="duyuru-listesi" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                </div>
        </div>
    </section>

    <footer id="iletisim" class="bg-koyu-siyah text-white py-12 border-t-8 border-bayrak-kirmizi text-center">
        <p class="mb-4 font-bold uppercase tracking-widest text-sm">Erzurum Şubesi - Doğu Anadolu Bölge Başkanlığı</p>
        <p class="text-gray-400 text-sm italic mb-6">"Şehitler nurlanmış, Gaziler onurlanmış askerdir."</p>
        <p class="text-xs text-gray-600">© 2026 Tüm Hakları Saklıdır.</p>
    </footer>

    <script>
        // Verileri sayfaya otomatik basan script
        document.getElementById('hakkimizda-yazi').innerText = SITE_VERILERI.hakkimizda;
        document.getElementById('misyon-yazi').innerText = SITE_VERILERI.misyon;
        document.getElementById('vizyon-yazi').innerText = SITE_VERILERI.vizyon;

        const duyuruListesi = document.getElementById('duyuru-listesi');
        SITE_VERILERI.duyurular.forEach(d => {
            duyuruListesi.innerHTML += `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                    <img src="${d.resim}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <span class="text-xs font-bold text-bayrak-kirmizi uppercase">${d.tarih}</span>
                        <h4 class="text-xl font-bold mt-2 mb-4 text-koyu-siyah">${d.baslik}</h4>
                        <p class="text-gray-600 text-sm leading-relaxed">${d.metin}</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
